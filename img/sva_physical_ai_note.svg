<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <style>
      :root{
        --p:#6A7FAB;
        --ink:#233042;
        --mut:rgba(35,48,66,.72);
        --line:rgba(106,127,171,.30);
        --soft:rgba(106,127,171,.10);
        --bg:#FAFBF9;
      }
      .title{font:800 44px system-ui,-apple-system,"Segoe UI",Roboto;}
      .sub{font:700 20px system-ui,-apple-system,"Segoe UI",Roboto; fill:var(--mut);}
      .h{font:800 22px system-ui,-apple-system,"Segoe UI",Roboto;}
      .t{font:600 17px system-ui,-apple-system,"Segoe UI",Roboto; fill:var(--mut);}
      .mono{font:700 15px ui-monospace,SFMono-Regular,Menlo,Consolas;}
      .card{fill:white; stroke:var(--line); stroke-width:1.4;}
      .layer{fill:var(--soft); stroke:rgba(106,127,171,.45); stroke-width:1.4;}
      .schema{fill:rgba(106,127,171,.22); stroke:#6A7FAB; stroke-width:2;}
      .arrow{stroke:rgba(106,127,171,.55); stroke-width:2.6; fill:none;}
    </style>

    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6"
            markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="rgba(106,127,171,.65)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="#FAFBF9"/>

  <!-- Header -->
  <text x="600" y="72" text-anchor="middle" class="title" fill="var(--ink)">
    SVA for Physical AI
  </text>
  <text x="600" y="110" text-anchor="middle" class="sub">
    AI・人・現場を「縦」に揃える設計原則
  </text>

  <!-- Vertical line -->
  <line x1="600" y1="150" x2="600" y2="650" class="arrow" marker-end="url(#arrow)"/>

  <!-- L0 -->
  <rect x="300" y="150" width="600" height="62" rx="14" class="layer"/>
  <text x="320" y="188" class="h">L0｜Purpose / Policy</text>
  <text x="640" y="188" class="t">判断の目的・制約・安全境界</text>

  <!-- L1 -->
  <rect x="260" y="230" width="680" height="78" rx="16" class="schema"/>
  <text x="280" y="266" class="h">L1｜Requirement / Schema</text>
  <text x="280" y="292" class="t">Input / Output / 状態 を固定する設計図</text>

  <!-- L2 -->
  <rect x="300" y="330" width="600" height="62" rx="14" class="layer"/>
  <text x="320" y="368" class="h">L2｜Logic / AI</text>
  <text x="640" y="368" class="t">推論・最適化・ルール</text>

  <!-- L3 -->
  <rect x="300" y="410" width="600" height="62" rx="14" class="layer"/>
  <text x="320" y="448" class="h">L3｜Orchestration</text>
  <text x="640" y="448" class="t">AI・人・装置の判断分担</text>

  <!-- L4 -->
  <rect x="300" y="490" width="600" height="62" rx="14" class="layer"/>
  <text x="320" y="528" class="h">L4｜Interface / Adapter</text>
  <text x="640" y="528" class="t">UI / API / 制御翻訳</text>

  <!-- L5 -->
  <rect x="300" y="570" width="600" height="62" rx="14" class="layer"/>
  <text x="320" y="608" class="h">L5｜Execution（Physical）</text>
  <text x="640" y="608" class="t">装置・ロボット・現場</text>

  <!-- Right explanation -->
  <rect x="880" y="200" width="270" height="260" rx="18" class="card"/>
  <text x="900" y="236" class="h">「縦」に揃える効果</text>
  <text x="900" y="272" class="t">・AIに判断の境界を与える</text>
  <text x="900" y="304" class="t">・人の責任範囲を明確化</text>
  <text x="900" y="336" class="t">・装置に安全に命令できる</text>

  <!-- Core -->
  <rect x="880" y="480" width="270" height="120" rx="18" class="card"/>
  <text x="900" y="516" class="h">SVAの核心</text>
  <text x="900" y="552" class="t">設計図（Schema）を先に決める</text>
  <text x="900" y="580" class="t mono">→ AIが現場で暴走しない</text>

  <!-- Footer -->
  <text x="20" y="740" class="t">© AIBOD Inc. / SVA for Physical AI</text>
</svg>
